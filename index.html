<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Ukkostutka — Miia & Caelan</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #1e293b;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title .icon { font-size: 32px; }
        .header-title h1 { font-size: 20px; font-weight: bold; }
        .header-title p { font-size: 12px; color: #94a3b8; }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-refresh {
            background: #f59e0b;
            color: #000;
        }
        
        .btn-refresh:hover { background: #d97706; }
        .btn-refresh:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        
        .btn-notify {
            background: #334155;
            color: white;
            font-size: 13px;
            padding: 8px 14px;
        }
        
        .btn-notify:hover { background: #475569; }
        
        .btn-notify.subscribed {
            background: #166534;
            color: #bbf7d0;
        }

        .btn-simulate {
            background: #7c3aed;
            color: white;
            font-size: 13px;
            padding: 8px 14px;
        }
        .btn-simulate:hover { background: #6d28d9; }
        .btn-simulate:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        .controls {
            background: #1e293b;
            padding: 12px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .controls label { font-size: 13px; color: #94a3b8; }
        
        .controls select {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .legend {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .map-container {
            flex: 1;
            position: relative;
            min-height: 400px;
        }
        
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        
        .status-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            min-width: 180px;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
        }
        
        .status-dot.active {
            background: #f59e0b;
            animation: pulse 2s infinite;
        }
        
        .status-warning {
            color: #fbbf24;
            font-weight: 600;
            padding: 8px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .status-time { font-size: 11px; color: #64748b; }
        
        .error-message {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(239, 68, 68, 0.95);
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            display: none;
        }
        
        .footer {
            background: #1e293b;
            padding: 12px;
            border-top: 1px solid #334155;
            text-align: center;
            font-size: 11px;
            color: #64748b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .loading-overlay.hidden { display: none; }
        
        .loading-text { text-align: center; }
        .loading-text .spinner {
            font-size: 40px;
            margin-bottom: 12px;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <span class="icon">⚡</span>
            <div>
                <h1>Ukkostutka</h1>
                <p>FMI Open Data • Live</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-notify" id="notifyBtn" onclick="toggleNotifications()">
                🔔 Hälytykset pois
            </button>
            <!-- Simuloi piilotettu (visibility) — palauta poistamalla style-attribuutti -->
            <button class="btn btn-simulate" id="simulateBtn" onclick="runSimulation()" style="visibility: hidden;">
                ⛈️ Simuloi
            </button>
            <button class="btn btn-refresh" id="refreshBtn" onclick="fetchLightningData()">
                🔄 Refresh
            </button>
        </div>
    </div>
    
    <div class="controls">
        <div>
            <label>Alert radius: </label>
            <select id="radiusSelect" onchange="updateRadius()">
                <option value="50">50 km</option>
                <option value="100">100 km</option>
                <option value="150">150 km</option>
                <option value="200" selected>200 km</option>
                <option value="300">300 km</option>
            </select>
        </div>
        <div class="legend">
            <span>🔵 Oulu</span>
            <span>⚡ Tuore (sisällä)</span>
            <span>🔸 Tuore (ulkona)</span>
            <span style="display:inline-flex;align-items:center;gap:5px;">
                Ikä:
                <i style="width:10px;height:10px;border-radius:50%;background:#ffffff;display:inline-block;"></i>
                <i style="width:9px;height:9px;border-radius:50%;background:#ffe600;display:inline-block;"></i>
                <i style="width:8px;height:8px;border-radius:50%;background:#ff9a00;display:inline-block;"></i>
                <i style="width:7px;height:7px;border-radius:50%;background:#ff2d00;display:inline-block;"></i>
                <i style="width:6px;height:6px;border-radius:50%;background:#b30000;display:inline-block;"></i>
                <i style="width:6px;height:6px;border-radius:50%;background:#7a0000;opacity:0.5;display:inline-block;"></i>
                <span style="font-size:11px;color:#64748b;">3 h</span>
            </span>
        </div>
    </div>
    
    <div class="map-container">
        <div id="map"></div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-text">
                <div class="spinner">🗺️</div>
                <p>Ladataan karttaa...</p>
            </div>
        </div>
        
        <div class="status-overlay">
            <div class="status-row">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Ladataan...</span>
            </div>
            <div class="status-warning" id="warningBox" style="display: none;">
                ⚠️ <span id="warningText"></span>
            </div>
            <div class="status-time" id="updateTime"></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
    </div>
    
    <div class="footer">
        Data: Finnish Meteorological Institute (FMI) Open Data | Map: © OpenStreetMap & CARTO | 
        Miia & Caelan ⚡🖤
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const WORKER_URL = 'https://fmi-lightning.demondes.workers.dev';
        const OULU_LAT = 65.0121;
        const OULU_LON = 25.4651;

        // Markkerit: ≤ FRESH_MINUTES = hymiö, vanhemmat = canvas-ympyrä ikäskaalalla
        const FRESH_MINUTES = 10;
        const HISTORY_MINUTES = 180; // 3 h

        let map = null;
        let canvasRenderer = null;
        let radiusCircle = null;
        let lightningMarkers = [];
        let currentRadius = 200;
        let swRegistration = null;

        // Blitzortung-tyylinen ikäväritys: tuorein valkoinen → fade
        function ageColor(ageMin) {
            if (ageMin <= 20)  return '#ffffff';
            if (ageMin <= 40)  return '#ffe600';
            if (ageMin <= 70)  return '#ff9a00';
            if (ageMin <= 110) return '#ff2d00';
            if (ageMin <= 150) return '#b30000';
            return '#7a0000';
        }
        // Liukuva 0–1 nuoresta (FRESH) vanhaan (HISTORY)
        function ageT(ageMin) {
            return Math.min(1, Math.max(0, (ageMin - FRESH_MINUTES) / (HISTORY_MINUTES - FRESH_MINUTES)));
        }
        function ageOpacity(ageMin) { return 1 - ageT(ageMin) * 0.6; } // 1.0 → 0.4
        function ageRadius(ageMin)  { return 5 - ageT(ageMin) * 2.5; }  // 5px → 2.5px

        // === SERVICE WORKER & NOTIFIKAATIOT ===

        async function initServiceWorker() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                document.getElementById('notifyBtn').style.display = 'none';
                return;
            }

            try {
                swRegistration = await navigator.serviceWorker.register('/sw.js');
                const existing = await swRegistration.pushManager.getSubscription();
                if (existing) {
                    updateNotifyButton(true);
                } else {
                    updateNotifyButton(false);
                }
            } catch (e) {
                console.error('SW rekisteröinti epäonnistui:', e);
            }
        }

        async function toggleNotifications() {
            if (!swRegistration) return;

            const existing = await swRegistration.pushManager.getSubscription();

            if (existing) {
                // Poistetaan subscriptio
                await existing.unsubscribe();
                updateNotifyButton(false);
                return;
            }

            // Pyydetään lupa
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('Ilmoituslupa evätty. Salli ilmoitukset selaimen asetuksista.');
                return;
            }

            // Haetaan VAPID public key Workerilta
            const keyRes = await fetch(WORKER_URL + '/vapid-public-key');
            const { publicKey } = await keyRes.json();

            // Subscribataan
            const subscription = await swRegistration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(publicKey)
            });

            // Lähetetään subscription Workerille
            await fetch(WORKER_URL + '/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(subscription)
            });

            updateNotifyButton(true);
        }

        function updateNotifyButton(subscribed) {
            const btn = document.getElementById('notifyBtn');
            if (subscribed) {
                btn.textContent = '🔔 Hälytykset päällä';
                btn.classList.add('subscribed');
            } else {
                btn.textContent = '🔕 Hälytykset pois';
                btn.classList.remove('subscribed');
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
        }

        // === KARTTA ===
        
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            initServiceWorker();
        });
        
        function initMap() {
            map = L.map('map', { preferCanvas: true }).setView([OULU_LAT, OULU_LON], 6);

            // Yksi jaettu canvas-piirtopinta kaikille ympyrämarkkereille (suorituskyky)
            canvasRenderer = L.canvas({ padding: 0.5 });
            
            // Tumma tausta saa salamavärit hehkumaan (CARTO dark matter, ei API-avainta)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            const ouluIcon = L.divIcon({
                className: 'oulu-marker',
                html: '<div style="background: #3b82f6; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            L.marker([OULU_LAT, OULU_LON], { icon: ouluIcon })
                .addTo(map)
                .bindPopup('<strong>🏠 Oulu</strong><br/>Kotipiste');
            
            radiusCircle = L.circle([OULU_LAT, OULU_LON], {
                radius: currentRadius * 1000,
                color: '#f59e0b',
                fillColor: '#fbbf24',
                fillOpacity: 0.08,
                weight: 2,
                dashArray: '8, 12'
            }).addTo(map);
            
            document.getElementById('loadingOverlay').classList.add('hidden');
            fetchLightningData();
        }
        
        // === DATA ===

        async function fetchLightningData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Haetaan...';
            hideError();
            
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                updateStatus(data);
                updateMarkers(data.strikes || []);
            } catch (err) {
                showError('Virhe: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Refresh';
            }
        }
        
        function updateStatus(data) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const time = document.getElementById('updateTime');
            const warningBox = document.getElementById('warningBox');
            const warningText = document.getElementById('warningText');
            
            const total = data.totalStrikes || 0;
            const inRadius = (data.strikes || []).filter(s => s.distanceFromOulu <= currentRadius).length;
            
            if (total === 0) {
                text.textContent = 'Ei salamoita';
                dot.classList.remove('active');
            } else {
                text.textContent = total + ' salamaa havaittu';
                dot.classList.add('active');
            }
            
            if (inRadius > 0) {
                warningBox.style.display = 'block';
                warningText.textContent = inRadius + ' salamaa säteen sisällä!';
            } else {
                warningBox.style.display = 'none';
            }
            
            time.textContent = 'Päivitetty: ' + new Date().toLocaleTimeString('fi-FI');
        }
        
        function updateMarkers(strikes) {
            lightningMarkers.forEach(m => map.removeLayer(m));
            lightningMarkers = [];

            const now = Date.now();

            strikes.forEach(strike => {
                const ts = strike.timestamp ? new Date(strike.timestamp).getTime() : now;
                const ageMin = (now - ts) / 60000;
                const isInRadius = strike.distanceFromOulu <= currentRadius;

                let marker;

                if (ageMin <= FRESH_MINUTES) {
                    // TUORE → hymiö (⚡ pulssi sisällä, 🔸 ulkona)
                    const icon = L.divIcon({
                        className: 'lightning-marker',
                        html: '<div style="font-size: 28px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));' +
                              (isInRadius ? ' animation: pulse 1s infinite;' : '') + '">' +
                              (isInRadius ? '⚡' : '🔸') + '</div>',
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    });
                    marker = L.marker([strike.lat, strike.lon], { icon: icon });
                } else {
                    // VANHEMPI → pieni canvas-ympyrä, väri/koko/opacity iän mukaan
                    const color = ageColor(ageMin);
                    marker = L.circleMarker([strike.lat, strike.lon], {
                        renderer: canvasRenderer,
                        radius: ageRadius(ageMin),
                        weight: 0,
                        fillColor: color,
                        fillOpacity: ageOpacity(ageMin)
                    });
                }

                marker.addTo(map).bindPopup(
                    '<div style="font-family: system-ui; min-width: 150px;">' +
                    '<strong>⚡ Salama</strong>' +
                    '<hr style="margin: 6px 0; border: none; border-top: 1px solid #ddd;"/>' +
                    '<b>Etäisyys:</b> ' + strike.distanceFromOulu + ' km<br/>' +
                    '<b>Ikä:</b> ' + (ageMin < 1 ? '<1' : Math.round(ageMin)) + ' min<br/>' +
                    (strike.peakCurrent ? '<b>Huippuvirta:</b> ' + strike.peakCurrent + ' kA<br/>' : '') +
                    (strike.timestamp ? '<b>Aika:</b> ' + new Date(strike.timestamp).toLocaleTimeString('fi-FI') + '<br/>' : '') +
                    (strike.cloudIndicator !== undefined ? '<b>Tyyppi:</b> ' + (strike.cloudIndicator === 1 ? 'Pilvisalama ☁️' : 'Maasalama ⚡') : '') +
                    '</div>'
                );

                lightningMarkers.push(marker);
            });
        }
        
        function updateRadius() {
            currentRadius = parseInt(document.getElementById('radiusSelect').value);
            if (radiusCircle) radiusCircle.setRadius(currentRadius * 1000);
            fetchLightningData();
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function runSimulation() {
    const btn = document.getElementById('simulateBtn');
    btn.disabled = true;

    // Näytetään fake-iskut kartalla HETI
    const now = Date.now();
    const fakeStrikes = [
        { lat: 64.5, lon: 25.8, distanceFromOulu: 58, peakCurrent: -42, timestamp: new Date(now - 180000).toISOString() },
        { lat: 64.2, lon: 26.1, distanceFromOulu: 91, peakCurrent: 31,  timestamp: new Date(now - 90000).toISOString() },
        { lat: 63.9, lon: 24.9, distanceFromOulu: 125, peakCurrent: -67, timestamp: new Date(now - 30000).toISOString() },
    ];
    updateMarkers(fakeStrikes);
    updateStatus({ totalStrikes: fakeStrikes.length, strikes: fakeStrikes });

    // Lasketaan alas — sulje sovellus nyt!
    let countdown = 30;
    btn.textContent = `⏳ ${countdown}s — sulje sovellus!`;
    const timer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            btn.textContent = `⏳ ${countdown}s — sulje sovellus!`;
        } else {
            clearInterval(timer);
            btn.textContent = '📡 Lähetetään...';
        }
    }, 1000);

    await new Promise(r => setTimeout(r, 30000));

    // Nyt lähetetään push Workerille
    try {
        await fetch(WORKER_URL + '/simulate', { method: 'POST' });
        btn.textContent = '✅ Lähetetty!';
    } catch (e) {
        showError('Simulointivirhe: ' + e.message);
    } finally {
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '⛈️ Simuloi';
        }, 3000);
    }
}
    </script>
</body>
</html>
