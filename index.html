<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Ukkostutka — Miia & Caelan</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Kokoontaitettava yläosa — maksimoi kartta mobiilissa */
        .chrome-toggle {
            margin-left: auto;
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chrome-toggle:hover { background: #475569; }
        body.compact .chrome-toggle { transform: rotate(180deg); }
        body.compact .header-actions { display: none; }
        body.compact .controls { display: none; }
        body.compact .header { padding: 10px 20px; }
        
        .header {
            background: #1e293b;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title .icon { font-size: 32px; }
        .header-title h1 { font-size: 20px; font-weight: bold; }
        .header-title p { font-size: 12px; color: #94a3b8; }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-refresh {
            background: #f59e0b;
            color: #000;
        }
        
        .btn-refresh:hover { background: #d97706; }
        .btn-refresh:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        
        .btn-notify {
            background: #334155;
            color: white;
            font-size: 13px;
            padding: 8px 14px;
        }
        
        .btn-notify:hover { background: #475569; }
        
        .btn-notify.subscribed {
            background: #166534;
            color: #bbf7d0;
        }

        .btn-simulate {
            background: #7c3aed;
            color: white;
            font-size: 13px;
            padding: 8px 14px;
        }
        .btn-simulate:hover { background: #6d28d9; }
        .btn-simulate:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        .controls {
            background: #1e293b;
            padding: 12px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .controls label { font-size: 13px; color: #94a3b8; }
        
        .controls select {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .legend {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .map-container {
            flex: 1;
            position: relative;
            min-height: 240px;
        }
        
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        
        .status-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            min-width: 180px;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
        }
        
        .status-dot.active {
            background: #f59e0b;
            animation: pulse 2s infinite;
        }
        
        .status-warning {
            color: #fbbf24;
            font-weight: 600;
            padding: 8px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .status-time { font-size: 11px; color: #64748b; }
        
        .error-message {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(239, 68, 68, 0.95);
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            display: none;
        }
        
        .footer {
            background: #1e293b;
            padding: 12px;
            border-top: 1px solid #334155;
            text-align: center;
            font-size: 11px;
            color: #64748b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .loading-overlay.hidden { display: none; }
        
        .loading-text { text-align: center; }
        .loading-text .spinner {
            font-size: 40px;
            margin-bottom: 12px;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <span class="icon">⚡</span>
            <div>
                <h1>Ukkostutka</h1>
                <p>FMI Open Data • Live</p>
            </div>
            <button class="chrome-toggle" id="chromeToggle" onclick="toggleChrome()" title="Pienennä / laajenna">⌃</button>
        </div>
        <div class="header-actions">
            <button class="btn btn-notify" id="notifyBtn" onclick="toggleNotifications()">
                🔔 Hälytykset pois
            </button>
            <!-- Simuloi piilotettu (visibility) — palauta poistamalla style-attribuutti -->
            <button class="btn btn-simulate" id="simulateBtn" onclick="runSimulation()" style="visibility: hidden;">
                ⛈️ Simuloi
            </button>
            <button class="btn btn-notify subscribed" id="cellsBtn" onclick="toggleCells()">
                ⛈️ Solut päällä
            </button>
            <button class="btn btn-refresh" id="refreshBtn" onclick="fetchLightningData()">
                🔄 Refresh
            </button>
        </div>
    </div>
    
    <div class="controls">
        <div>
            <label>Alert radius: </label>
            <select id="radiusSelect" onchange="updateRadius()">
                <option value="50">50 km</option>
                <option value="100">100 km</option>
                <option value="150">150 km</option>
                <option value="200" selected>200 km</option>
                <option value="300">300 km</option>
            </select>
        </div>
        <div class="legend">
            <span>🔵 Oulu</span>
            <span>⚡ Tuore (sisällä)</span>
            <span>🔸 Tuore (ulkona)</span>
            <span style="display:inline-flex;align-items:center;gap:5px;">
                Ikä:
                <i style="width:10px;height:10px;border-radius:50%;background:#ffffff;display:inline-block;"></i>
                <i style="width:9px;height:9px;border-radius:50%;background:#ffe600;display:inline-block;"></i>
                <i style="width:8px;height:8px;border-radius:50%;background:#ff9a00;display:inline-block;"></i>
                <i style="width:7px;height:7px;border-radius:50%;background:#ff2d00;display:inline-block;"></i>
                <i style="width:6px;height:6px;border-radius:50%;background:#b30000;display:inline-block;"></i>
                <i style="width:6px;height:6px;border-radius:50%;background:#7a0000;opacity:0.5;display:inline-block;"></i>
                <span style="font-size:11px;color:#64748b;">3 h</span>
            </span>
            <span style="display:inline-flex;align-items:center;gap:5px;">
                <i style="width:11px;height:11px;border-radius:50%;border:2px solid #22d3ee;display:inline-block;"></i>
                Myrskysolu + suunta
            </span>
        </div>
    </div>
    
    <div class="map-container">
        <div id="map"></div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-text">
                <div class="spinner">🗺️</div>
                <p>Ladataan karttaa...</p>
            </div>
        </div>
        
        <div class="status-overlay">
            <div class="status-row">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Ladataan...</span>
            </div>
            <div class="status-warning" id="warningBox" style="display: none;">
                ⚠️ <span id="warningText"></span>
            </div>
            <div class="status-time" id="updateTime"></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
    </div>
    
    <div class="footer">
        Data: Finnish Meteorological Institute (FMI) Open Data | Map: © OpenStreetMap & CARTO | 
        Miia & Caelan ⚡🖤
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const WORKER_URL = 'https://fmi-lightning.demondes.workers.dev';
        const OULU_LAT = 65.0121;
        const OULU_LON = 25.4651;

        // Markkerit: ≤ FRESH_MINUTES = hymiö, vanhemmat = canvas-ympyrä ikäskaalalla
        const FRESH_MINUTES = 10;
        const HISTORY_MINUTES = 180; // 3 h

        let map = null;
        let canvasRenderer = null;
        let radiusCircle = null;
        let lightningMarkers = [];
        let currentRadius = 200;
        let swRegistration = null;

        // Myrskysolut (/cells)
        let cellLayer = null;
        let showCells = true;
        const CELL_COLOR = '#22d3ee';        // syaani — erottuu salamavär:istä tummalla
        const CELL_COLOR_INACTIVE = '#64748b';// sammunut solu, harmaa

        // Blitzortung-tyylinen ikäväritys: tuorein valkoinen → fade
        function ageColor(ageMin) {
            if (ageMin <= 20)  return '#ffffff';
            if (ageMin <= 40)  return '#ffe600';
            if (ageMin <= 70)  return '#ff9a00';
            if (ageMin <= 110) return '#ff2d00';
            if (ageMin <= 150) return '#b30000';
            return '#7a0000';
        }
        // Liukuva 0–1 nuoresta (FRESH) vanhaan (HISTORY)
        function ageT(ageMin) {
            return Math.min(1, Math.max(0, (ageMin - FRESH_MINUTES) / (HISTORY_MINUTES - FRESH_MINUTES)));
        }
        function ageOpacity(ageMin) { return 1 - ageT(ageMin) * 0.6; } // 1.0 → 0.4
        function ageRadius(ageMin)  { return 5 - ageT(ageMin) * 2.5; }  // 5px → 2.5px

        // Projisoi piste annetusta sijainnista suuntaan + matkaan (nuolen kärki)
        function destinationPoint(lat, lon, bearingDeg, distKm) {
            const R = 6371;
            const d = distKm / R;
            const br = bearingDeg * Math.PI / 180;
            const la1 = lat * Math.PI / 180, lo1 = lon * Math.PI / 180;
            const la2 = Math.asin(Math.sin(la1) * Math.cos(d) + Math.cos(la1) * Math.sin(d) * Math.cos(br));
            const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(d) * Math.cos(la1),
                                          Math.cos(d) - Math.sin(la1) * Math.sin(la2));
            return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
        }
        function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

        // === SERVICE WORKER & NOTIFIKAATIOT ===

        async function initServiceWorker() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                document.getElementById('notifyBtn').style.display = 'none';
                return;
            }

            try {
                swRegistration = await navigator.serviceWorker.register('/sw.js');
                const existing = await swRegistration.pushManager.getSubscription();
                if (existing) {
                    updateNotifyButton(true);
                } else {
                    updateNotifyButton(false);
                }
            } catch (e) {
                console.error('SW rekisteröinti epäonnistui:', e);
            }
        }

        async function toggleNotifications() {
            if (!swRegistration) return;

            const existing = await swRegistration.pushManager.getSubscription();

            if (existing) {
                // Poistetaan subscriptio
                await existing.unsubscribe();
                updateNotifyButton(false);
                return;
            }

            // Pyydetään lupa
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('Ilmoituslupa evätty. Salli ilmoitukset selaimen asetuksista.');
                return;
            }

            // Haetaan VAPID public key Workerilta
            const keyRes = await fetch(WORKER_URL + '/vapid-public-key');
            const { publicKey } = await keyRes.json();

            // Subscribataan
            const subscription = await swRegistration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(publicKey)
            });

            // Lähetetään subscription Workerille
            await fetch(WORKER_URL + '/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(subscription)
            });

            updateNotifyButton(true);
        }

        function updateNotifyButton(subscribed) {
            const btn = document.getElementById('notifyBtn');
            if (subscribed) {
                btn.textContent = '🔔 Hälytykset päällä';
                btn.classList.add('subscribed');
            } else {
                btn.textContent = '🔕 Hälytykset pois';
                btn.classList.remove('subscribed');
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
        }

        // === KARTTA ===
        
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            initServiceWorker();
        });
        
        function initMap() {
            map = L.map('map', { preferCanvas: true }).setView([OULU_LAT, OULU_LON], 6);

            // Yksi jaettu canvas-piirtopinta kaikille ympyrämarkkereille (suorituskyky)
            canvasRenderer = L.canvas({ padding: 0.5 });
            
            // Tumma tausta saa salamavärit hehkumaan (CARTO dark matter, ei API-avainta)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            const ouluIcon = L.divIcon({
                className: 'oulu-marker',
                html: '<div style="background: #3b82f6; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            L.marker([OULU_LAT, OULU_LON], { icon: ouluIcon })
                .addTo(map)
                .bindPopup('<strong>🏠 Oulu</strong><br/>Kotipiste');
            
            radiusCircle = L.circle([OULU_LAT, OULU_LON], {
                radius: currentRadius * 1000,
                color: '#f59e0b',
                fillColor: '#fbbf24',
                fillOpacity: 0.08,
                weight: 2,
                dashArray: '8, 12'
            }).addTo(map);

            cellLayer = L.layerGroup().addTo(map);

            document.getElementById('loadingOverlay').classList.add('hidden');
            fetchLightningData();
        }
        
        // === DATA ===

        async function fetchLightningData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Haetaan...';
            hideError();
            
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                updateStatus(data);
                updateMarkers(data.strikes || []);
                fetchCells();
            } catch (err) {
                showError('Virhe: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Refresh';
            }
        }

        // === MYRSKYSOLUT ===
        async function fetchCells() {
            try {
                const response = await fetch(WORKER_URL + '/cells');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                drawCells(data.cells || []);
            } catch (err) {
                // Solut eivät kaada koko karttaa — vain salamat ovat kriittisiä
                console.warn('Solujen haku epäonnistui:', err.message);
            }
        }

        function drawCells(cells) {
            if (!cellLayer) return;
            cellLayer.clearLayers();
            if (!showCells) return;

            cells.forEach(cell => {
                if (!cell.latest) return;
                const active = cell.status === 'active';
                const color = active ? CELL_COLOR : CELL_COLOR_INACTIVE;
                const L0 = cell.latest;

                // 1) Häntä — polku viivana (vanhin → uusin)
                if (cell.track && cell.track.length > 1) {
                    const pts = cell.track.map(p => [p.lat, p.lon]);
                    L.polyline(pts, {
                        color: color,
                        weight: 2,
                        opacity: active ? 0.55 : 0.3,
                        dashArray: active ? null : '4, 6'
                    }).addTo(cellLayer);
                    // pienet pisteet jokaiseen historian näytteeseen
                    cell.track.slice(0, -1).forEach((p, i) => {
                        const t = (i + 1) / cell.track.length; // vanha → uusi
                        L.circleMarker([p.lat, p.lon], {
                            renderer: canvasRenderer,
                            radius: 2.5,
                            weight: 0,
                            fillColor: color,
                            fillOpacity: 0.25 + t * 0.4
                        }).addTo(cellLayer);
                    });
                }

                // 2) Suuntanuoli — kärki projisoidaan suuntaan, pituus nopeudesta
                if (L0.direction_deg != null && L0.speed_kmh != null && L0.speed_kmh > 0) {
                    const lenKm = clamp(L0.speed_kmh * 0.5, 12, 70);
                    const tip = destinationPoint(L0.lat, L0.lon, L0.direction_deg, lenKm);
                    L.polyline([[L0.lat, L0.lon], tip], {
                        color: color, weight: 2.5, opacity: active ? 0.9 : 0.4
                    }).addTo(cellLayer);
                    // kärkikolmio rotatoituna suuntaan (CSS, 0° = pohjoinen ylös)
                    const headIcon = L.divIcon({
                        className: 'cell-arrowhead',
                        html: '<div style="width:0;height:0;border-left:6px solid transparent;'
                            + 'border-right:6px solid transparent;border-bottom:11px solid ' + color + ';'
                            + 'transform: rotate(' + L0.direction_deg + 'deg);'
                            + 'opacity:' + (active ? 1 : 0.5) + ';"></div>',
                        iconSize: [12, 11],
                        iconAnchor: [6, 6]
                    });
                    L.marker(tip, { icon: headIcon, interactive: false }).addTo(cellLayer);
                }

                // 3) Keskusmarkkeri — ontto rengas (erottuu salamoista)
                const center = L.circleMarker([L0.lat, L0.lon], {
                    renderer: canvasRenderer,
                    radius: active ? 9 : 7,
                    color: color,
                    weight: active ? 2.5 : 1.5,
                    fillColor: color,
                    fillOpacity: 0.12,
                    dashArray: active ? null : '3, 4'
                }).addTo(cellLayer);

                // 4) Klikattava infokupla
                const ageMin = Math.round((new Date(cell.last_seen) - new Date(cell.first_seen)) / 60000);
                const dirLine = (L0.direction_deg != null && L0.compass)
                    ? 'Kulkee <b>' + L0.compass + '</b> ~' + Math.round(L0.speed_kmh) + ' km/h'
                    : '<i>suunta lasketaan…</i>';
                center.bindPopup(
                    '<div style="font-family: system-ui; min-width: 170px;">' +
                    '<strong>⛈️ Myrskysolu #' + cell.id + '</strong>' +
                    (active ? '' : ' <span style="color:#94a3b8;">(sammunut)</span>') +
                    '<hr style="margin:6px 0;border:none;border-top:1px solid #ddd;"/>' +
                    dirLine + '<br/>' +
                    '<b>Aktiivisuus:</b> ' + L0.strike_count + ' iskua (huippu ' + cell.peak_strikes + ')<br/>' +
                    '<b>Etäisyys:</b> ' + L0.distance_from_oulu + ' km Oulusta<br/>' +
                    '<b>Ikä:</b> ' + ageMin + ' min<br/>' +
                    '<b>Polkupisteitä:</b> ' + (cell.track ? cell.track.length : 1) +
                    '</div>'
                );
            });
        }

        function toggleCells() {
            showCells = !showCells;
            const btn = document.getElementById('cellsBtn');
            btn.textContent = showCells ? '⛈️ Solut päällä' : '⛈️ Solut pois';
            btn.classList.toggle('subscribed', showCells);
            fetchCells();
        }

        function toggleChrome() {
            document.body.classList.toggle('compact');
            // Leaflet tarvitsee tiedon että karttasäiliön koko muuttui
            setTimeout(() => { if (map) map.invalidateSize(); }, 220);
        }
        
        function updateStatus(data) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const time = document.getElementById('updateTime');
            const warningBox = document.getElementById('warningBox');
            const warningText = document.getElementById('warningText');
            
            const total = data.totalStrikes || 0;
            const inRadius = (data.strikes || []).filter(s => s.distanceFromOulu <= currentRadius).length;
            
            if (total === 0) {
                text.textContent = 'Ei salamoita';
                dot.classList.remove('active');
            } else {
                text.textContent = total + ' salamaa havaittu';
                dot.classList.add('active');
            }
            
            if (inRadius > 0) {
                warningBox.style.display = 'block';
                warningText.textContent = inRadius + ' salamaa säteen sisällä!';
            } else {
                warningBox.style.display = 'none';
            }
            
            time.textContent = 'Päivitetty: ' + new Date().toLocaleTimeString('fi-FI');
        }
        
        function updateMarkers(strikes) {
            lightningMarkers.forEach(m => map.removeLayer(m));
            lightningMarkers = [];

            const now = Date.now();

            strikes.forEach(strike => {
                const ts = strike.timestamp ? new Date(strike.timestamp).getTime() : now;
                const ageMin = (now - ts) / 60000;
                const isInRadius = strike.distanceFromOulu <= currentRadius;

                let marker;

                if (ageMin <= FRESH_MINUTES) {
                    // TUORE → hymiö (⚡ pulssi sisällä, 🔸 ulkona)
                    const icon = L.divIcon({
                        className: 'lightning-marker',
                        html: '<div style="font-size: 28px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));' +
                              (isInRadius ? ' animation: pulse 1s infinite;' : '') + '">' +
                              (isInRadius ? '⚡' : '🔸') + '</div>',
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    });
                    marker = L.marker([strike.lat, strike.lon], { icon: icon });
                } else {
                    // VANHEMPI → pieni canvas-ympyrä, väri/koko/opacity iän mukaan
                    const color = ageColor(ageMin);
                    marker = L.circleMarker([strike.lat, strike.lon], {
                        renderer: canvasRenderer,
                        radius: ageRadius(ageMin),
                        weight: 0,
                        fillColor: color,
                        fillOpacity: ageOpacity(ageMin)
                    });
                }

                marker.addTo(map).bindPopup(
                    '<div style="font-family: system-ui; min-width: 150px;">' +
                    '<strong>⚡ Salama</strong>' +
                    '<hr style="margin: 6px 0; border: none; border-top: 1px solid #ddd;"/>' +
                    '<b>Etäisyys:</b> ' + strike.distanceFromOulu + ' km<br/>' +
                    '<b>Ikä:</b> ' + (ageMin < 1 ? '<1' : Math.round(ageMin)) + ' min<br/>' +
                    (strike.peakCurrent ? '<b>Huippuvirta:</b> ' + strike.peakCurrent + ' kA<br/>' : '') +
                    (strike.timestamp ? '<b>Aika:</b> ' + new Date(strike.timestamp).toLocaleTimeString('fi-FI') + '<br/>' : '') +
                    (strike.cloudIndicator !== undefined ? '<b>Tyyppi:</b> ' + (strike.cloudIndicator === 1 ? 'Pilvisalama ☁️' : 'Maasalama ⚡') : '') +
                    '</div>'
                );

                lightningMarkers.push(marker);
            });
        }
        
        function updateRadius() {
            currentRadius = parseInt(document.getElementById('radiusSelect').value);
            if (radiusCircle) radiusCircle.setRadius(currentRadius * 1000);
            fetchLightningData();
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function runSimulation() {
    const btn = document.getElementById('simulateBtn');
    btn.disabled = true;

    // Näytetään fake-iskut kartalla HETI
    const now = Date.now();
    const fakeStrikes = [
        { lat: 64.5, lon: 25.8, distanceFromOulu: 58, peakCurrent: -42, timestamp: new Date(now - 180000).toISOString() },
        { lat: 64.2, lon: 26.1, distanceFromOulu: 91, peakCurrent: 31,  timestamp: new Date(now - 90000).toISOString() },
        { lat: 63.9, lon: 24.9, distanceFromOulu: 125, peakCurrent: -67, timestamp: new Date(now - 30000).toISOString() },
    ];
    updateMarkers(fakeStrikes);
    updateStatus({ totalStrikes: fakeStrikes.length, strikes: fakeStrikes });

    // Lasketaan alas — sulje sovellus nyt!
    let countdown = 30;
    btn.textContent = `⏳ ${countdown}s — sulje sovellus!`;
    const timer = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            btn.textContent = `⏳ ${countdown}s — sulje sovellus!`;
        } else {
            clearInterval(timer);
            btn.textContent = '📡 Lähetetään...';
        }
    }, 1000);

    await new Promise(r => setTimeout(r, 30000));

    // Nyt lähetetään push Workerille
    try {
        await fetch(WORKER_URL + '/simulate', { method: 'POST' });
        btn.textContent = '✅ Lähetetty!';
    } catch (e) {
        showError('Simulointivirhe: ' + e.message);
    } finally {
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '⛈️ Simuloi';
        }, 3000);
    }
}
    </script>
